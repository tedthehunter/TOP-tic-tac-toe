<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <title>Document</title>
</head>
<body>
    <div id="input-area">
        <div id="player-names">
            <div>
                <label for="playerXName">Player X Name:</label>
                <input type="text" name="playerXName" id="playerXName">
            </div>
            <div>
                <label for="playerOName">Player O Name:</label>
                <input type="text" name="playerOName" id="playerOName">
            </div>
        </div>
        <button type="button" id="game-start">Start Game</button>
    </div>
    <div class="board-area">
        <div class="board-square" id="cell-0-0"></div>
        <div class="board-square" id="cell-0-1"></div>
        <div class="board-square" id="cell-0-2"></div>
        <div class="board-square" id="cell-1-0"></div>
        <div class="board-square" id="cell-1-1"></div>
        <div class="board-square" id="cell-1-2"></div>
        <div class="board-square" id="cell-2-0"></div>
        <div class="board-square" id="cell-2-1"></div>
        <div class="board-square" id="cell-2-2"></div>
    </div>
    <div id="game-status"></div>
    
    
    
    <script src="script.js"></script>
</body>
</html>
